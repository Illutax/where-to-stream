services:
  w2s:
    container_name: w2s
    image: "w2s:${DOCKER_IMAGE_TAG}"
    volumes:
      - ./assets:/opt/app/assets:ro,Z
      - ./logs:/opt/app/logs:Z
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=mariadb
      - MARIADB_URL=jdbc:mariadb://mariadb:3306/w2s
      - MARIADB_USER=w2s
      - MARIADB_PASSWORD=w2s
#      - logging.level.org.springframework.web.servlet.DispatcherServlet=TRACE
      - server.servlet.context-path=/w2s
      - W2S_SECURITY_INITIALADMIN_USER=${W2S_ADMIN_USER}
      - W2S_SECURITY_INITIALADMIN_PASSWORD=${W2S_ADMIN_PASSWORD}
    depends_on:
      - db
    networks:
      - webserver
      - db
    restart: always

  db:
    container_name: db
    image: mariadb:lts-ubi
    environment:
      - MARIADB_DATABASE=w2s
      - MARIADB_USER=w2s
      - MARIADB_PASSWORD=w2s
      - MARIADB_ROOT_PASSWORD=change-me
    volumes:
      # Named volume (not a bind mount): the engine initialises it with the image's
      # mysql:mysql ownership and handles the rootless-Podman uid mapping, avoiding the
      # "Permission denied" a host-owned bind mount causes. The DB is a regenerable cache.
      - mariadb-data:/var/lib/mysql
    networks:
      - db
    restart: no

volumes:
  mariadb-data:

networks:
  webserver:
    name: webserver
    external: true
  db:

