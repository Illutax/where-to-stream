# First-class MariaDB datasource, activated with spring.profiles.active=mariadb.
# Values are overridable via environment variables; the schema is still managed by Liquibase.
spring.datasource.url=${MARIADB_URL:jdbc:mariadb://localhost:3306/w2s}
spring.datasource.username=${MARIADB_USER:w2s}
spring.datasource.password=${MARIADB_PASSWORD:w2s}
