server.port=8001
#server.servlet.context-path=/api/v1/
spring.application.name=where-to-stream

#spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.url=jdbc:h2:file:./db/demo
#spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Schema is owned by Liquibase (classpath:/db/changelog/db.changelog-master.yaml);
# Hibernate only validates that the entities match it.
spring.jpa.hibernate.ddl-auto=validate

wer-streamt.path=assets

# Be polite to werstreamt.es: cap outbound scrape requests per second (<= 0 disables).
wer-streamt.rate-limit.requests-per-second=20