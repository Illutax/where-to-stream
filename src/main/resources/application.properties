server.port=8001
#server.servlet.context-path=/api/v1/
spring.application.name=where-to-stream

#spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.url=jdbc:h2:file:./db/demo
#spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Schema is owned by Liquibase (classpath:/db/changelog/db.changelog-master.yaml); the XML
# changelog provisions both H2 and MariaDB. Hibernate neither creates nor validates the schema
# (portable types differ per dialect); correctness is covered by the repository tests.
spring.jpa.hibernate.ddl-auto=none

wer-streamt.path=assets

# Be polite to werstreamt.es: cap outbound scrape requests per second (<= 0 disables).
wer-streamt.rate-limit.requests-per-second=20

# Write application logs to ./logs (gitignored); console logging stays enabled.
logging.file.name=logs/w2s.log