<!DOCTYPE html>
<html lang="de" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark py-lg-0 h-lg-55px">
    <div class="container">
        <ul class="navbar-nav me-auto">
            <li class="navbar-brand">
                <a class="nav-link" href="/">W2S</a>
            </li>
            <li class="nav-item py-lg-2 mx-lg-2">
                <a class="nav-link text-light px-0 py-lg-2" th:href="@{/disney}">
                    Disney<i class="fas fa-plus"></i>
                </a>
            </li>
            <li class="nav-item py-lg-2 mx-lg-2">
                <a class="nav-link text-light px-0 py-lg-2" th:href="@{/amazon}">
                    Amazon Prime
                </a>
            </li>
            <li class="nav-item py-lg-2 mx-lg-2">
                <a class="nav-link text-light px-0 py-lg-2" th:href="@{/google}">
                    Google Play
                </a>
            </li>
            <li class="nav-item py-lg-2 mx-lg-2">
                <a class="nav-link text-light px-0 py-lg-2" th:href="@{/netflix}">
                    Nietflix
                </a>
            </li>
            <li class="nav-item py-lg-2 mx-lg-2">
                <a class="nav-link text-light px-0 py-lg-2" th:href="@{/wow}">
                    Sky WOW
                </a>
            </li>
        </ul>
        <ul class="navbar-nav me-auto">
            <li class="nav-item py-lg-2 mx-lg-2" sec:authorize="hasRole('ADMIN')">
                <a class="nav-link text-light px-0 py-lg-2" th:href="@{/list}">
                    <i class="fas fa-cog"></i> Change List
                </a>
            </li>
            <li class="nav-item py-lg-2 mx-lg-2" sec:authorize="hasRole('ADMIN')">
                <a class="nav-link text-light px-0 py-lg-2" th:href="@{/manage}">
                    <i class="fas fa-sync"></i> Manage Cache
                </a>
            </li>
            <li class="nav-item py-lg-2 mx-lg-2" sec:authorize="hasRole('ADMIN')">
                <a class="nav-link text-light px-0 py-lg-2" th:href="@{/admin/users}">
                    <i class="fas fa-users"></i> Users
                </a>
            </li>
            <li class="nav-item py-lg-2 mx-lg-2">
                <a class="nav-link text-light px-0 py-lg-2" th:href="@{/app/}">
                    <i class="fas fa-bolt"></i> Angular UI
                </a>
            </li>
            <li class="nav-item py-lg-2 mx-lg-2 text-light px-0 py-lg-2">
                Selected list: <span th:text="${selectedList}"></span>
            </li>
            <li class="nav-item py-lg-2 mx-lg-2 text-light px-0 py-lg-2" sec:authorize="isAuthenticated()">
                <i class="fas fa-user"></i> <span sec:authentication="name">user</span>
            </li>
            <li class="nav-item py-lg-2 mx-lg-2" sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-outline-light">Logout</button>
                </form>
            </li>
        </ul>
    </div>
</nav>
</body>
</html>
