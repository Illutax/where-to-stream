# Optional "Login with Google" (OIDC). Enable with SPRING_PROFILES_ACTIVE=google and provide the
# credentials via env (GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET). Without this profile no OAuth2
# client registration exists, so OIDC login stays off and the app runs on local accounts only.
#
# The redirect URI to register with Google is:
#   {baseUrl}/login/oauth2/code/google   (e.g. https://host/w2s/login/oauth2/code/google)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
